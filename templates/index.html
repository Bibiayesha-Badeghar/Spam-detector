<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Scanner - Spam Detector</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f19; --card-bg: rgba(255, 255, 255, 0.03); --card-border: rgba(255, 255, 255, 0.08);
      --accent: #00f2fe; --accent-2: #4facfe; --text: #f8fafc; --muted: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: 'Outfit', sans-serif;
      background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; padding: 32px;
    }
    .glow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80vw; height: 80vw; background: radial-gradient(circle, rgba(0,242,254,0.05) 0%, rgba(0,0,0,0) 60%); z-index: 0; pointer-events: none; }
    
    .page { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 1fr 380px; gap: 32px; z-index: 1; }
    .card { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 32px; border-radius: 24px; border: 1px solid var(--card-border); box-shadow: 0 24px 80px rgba(0,0,0,0.5); }
    
    .title { margin: 0 0 8px; font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 16px; }
    .sig-icon { width: 44px; height: 44px; border-radius: 12px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; box-shadow: 0 8px 20px rgba(0,242,254,0.2); }
    .subtitle { margin: 0 0 24px 0; color: var(--muted); font-weight: 300; line-height: 1.5; }
    
    textarea {
      width: 100%; min-height: 300px; padding: 20px; border-radius: 16px; border: 1px solid var(--card-border);
      font-size: 16px; resize: vertical; line-height: 1.6; color: var(--text); background: rgba(0,0,0,0.2);
      transition: all 0.2s ease; font-family: 'Outfit', sans-serif; margin-bottom: 20px;
    }
    textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,242,254,0.1); }
    
    .controls { display: flex; gap: 16px; align-items: center; }
    .btn { padding: 14px 28px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; font-size: 1rem; transition: all 0.3s ease; text-decoration: none; display: inline-flex; justify-content: center; align-items: center; }
    .btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: 0 8px 25px rgba(0,242,254,0.25); }
    .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(0,242,254,0.35); }
    .btn.ghost { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--card-border); }
    .btn.ghost:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
    
    .examples { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
    .chip { background: rgba(255,255,255,0.03); padding: 16px; border-radius: 12px; font-size: 14px; color: var(--muted); cursor: pointer; border: 1px solid var(--card-border); transition: all 0.2s ease; text-align: left; }
    .chip strong { display: block; color: var(--text); margin-bottom: 4px; font-size: 15px; }
    .chip:hover { background: rgba(0,242,254,0.05); border-color: rgba(0,242,254,0.3); transform: translateX(5px); }

    @media (max-width: 980px) { .page { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="page">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start">
        <div>
          <h1 class="title"><span class="sig-icon">SD</span> Threat Scanner</h1>
          <p class="subtitle">Paste the suspicious message below to initiate deep analysis.</p>
        </div>
        <a href="/" class="btn ghost" style="padding: 10px 16px; font-size: 14px;">Back</a>
      </div>
      
      <form action="/check" method="post" id="analyzeForm">
        <textarea id="email_text" name="email_text" placeholder="Awaiting raw text input..."></textarea>
        <div class="controls">
          <button class="btn primary" type="submit">Analyze Payload</button>
          <button class="btn ghost" type="button" onclick="document.getElementById('email_text').value=''">Clear</button>
        </div>
      </form>
    </div>

    <div class="card" style="align-self: flex-start;">
      <h3 style="margin:0 0 16px; font-size:18px; color:var(--text)">Load Test Vectors</h3>
      <p style="color:var(--muted); font-size:14px; margin-top:0;">Select a template to test the model's classification capabilities.</p>
      <div class="examples">
        <button type="button" class="chip" onclick="document.getElementById('email_text').value='Subject: You won! Claim your Amazon gift card now\n\nDear Customer,\n\nCongratulations! You have been selected as one of our lucky winners. Click the link below to verify your identity and claim your FREE $500 Amazon Gift Card today!\n\nhttp://amaz0n-rewards-verify.com/claim\n\nThis offer expires in 24 hours.\n\nBest regards,\nAmazon Rewards Team'">
          <strong>Fake Prize Scam</strong>
          High urgency, suspicious links, monetary reward.
        </button>
        <button type="button" class="chip" onclick="document.getElementById('email_text').value='Subject: URGENT: Suspicious activity on your Chase account\n\nHello,\n\nWe have detected unauthorized login attempts on your Chase bank account. For your security, please verify your account information immediately by clicking this link:\n\nhttp://chase-security-verify.ru/login\n\nIf this was not you, change your password immediately.\n\nChase Security Team'">
          <strong>Bank Phishing</strong>
          Account compromise alert, fake verification URL.
        </button>
        <button type="button" class="chip" onclick="document.getElementById('email_text').value='Hi team,\n\nI wanted to follow up on the Q3 budget proposal we discussed last week. Could you send over your departmental forecasts by end of week? We need to finalize the spreadsheet before the executive review on Friday.\n\nThanks!\nMichael'">
          <strong>Legitimate Work Email</strong>
          Standard corporate communication, no threats.
        </button>
      </div>
    </div>
  </div>
</body>
</html>
